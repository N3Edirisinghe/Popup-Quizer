<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Test Page</title>
    <style>
        body { font-family: sans-serif; padding: 50px; }
        .quiz-question { 
            border: 1px solid #ccc; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 8px;
            max-width: 500px;
        }
        .quiz-option { 
            display: block; 
            padding: 10px; 
            margin: 5px 0; 
            background: #f9f9f9; 
            border-radius: 4px;
            cursor: pointer;
        }
        .quiz-option:hover { background: #eee; }
    </style>
</head>
<body>
    <h1>Popup Quizer Test Page</h1>
    <p>Hover over the questions below to test the extension.</p>

    <div class="quiz-question">
        <h3>What is the capital of France?</h3>
        <div class="quiz-option">A) London</div>
        <div class="quiz-option">B) Berlin</div>
        <div class="quiz-option">C) Paris</div>
        <div class="quiz-option">D) Madrid</div>
    </div>

    <div class="quiz-question">
        <h3>Which planet is known as the Red Planet?</h3>
        <div class="quiz-option">1. Venus</div>
        <div class="quiz-option">2. Mars</div>
        <div class="quiz-option">3. Jupiter</div>
        <div class="quiz-option">4. Saturn</div>
    </div>
</body>
</html>
